services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: rlhf_dev
    ports:
      - "5432:5432"
    volumes:
      - rlhf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d rlhf_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn rlhf_eval.api.routes:app --host 0.0.0.0 --port 8000 --reload
    environment:
      RLHF_DATABASE_URL: postgresql://user:pass@postgres:5432/rlhf_dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      RLHF_DATABASE_URL: postgresql://user:pass@postgres:5432/rlhf_dev
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  rlhf_pgdata:
